<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440">
  <defs>
    <linearGradient id="gold-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D5A3"/>
      <stop offset="25%" style="stop-color:#D4B96A"/>
      <stop offset="50%" style="stop-color:#C9A84C"/>
      <stop offset="75%" style="stop-color:#B8963A"/>
      <stop offset="100%" style="stop-color:#A6842F"/>
    </linearGradient>
    <linearGradient id="gold-light" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0E2B6"/>
      <stop offset="100%" style="stop-color:#D4B96A"/>
    </linearGradient>
    <linearGradient id="gold-crown" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F2E6C2"/>
      <stop offset="30%" style="stop-color:#D9C172"/>
      <stop offset="60%" style="stop-color:#C4A64E"/>
      <stop offset="100%" style="stop-color:#9E7E2A"/>
    </linearGradient>
    <filter id="subtle-glow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Crown - refined geometric, balanced proportions -->
  <g transform="translate(400, 28)" filter="url(#subtle-glow)">
    <!-- Crown base band with beveled edges -->
    <path d="M-52,82 L52,82 L48,72 L-48,72 Z" fill="url(#gold-main)"/>
    
    <!-- Crown body - five points, elegant curves -->
    <path d="M-48,72 L-56,24 L-32,48 L-16,16 L0,44 L16,16 L32,48 L56,24 L48,72 Z" 
          fill="url(#gold-crown)" stroke="url(#gold-light)" stroke-width="0.5"/>
    
    <!-- Inner crown detail - arches -->
    <path d="M-36,72 Q-28,52 -18,72" fill="none" stroke="url(#gold-light)" stroke-width="1" opacity="0.4"/>
    <path d="M-12,72 Q0,48 12,72" fill="none" stroke="url(#gold-light)" stroke-width="1" opacity="0.4"/>
    <path d="M18,72 Q28,52 36,72" fill="none" stroke="url(#gold-light)" stroke-width="1" opacity="0.4"/>
    
    <!-- Crown jewels - refined orbs at each point -->
    <circle cx="-56" cy="21" r="4.5" fill="url(#gold-light)"/>
    <circle cx="-56" cy="21" r="2.5" fill="url(#gold-crown)" opacity="0.6"/>
    <circle cx="-16" cy="13" r="4" fill="url(#gold-light)"/>
    <circle cx="-16" cy="13" r="2" fill="url(#gold-crown)" opacity="0.6"/>
    <circle cx="0" cy="41" r="3.5" fill="url(#gold-light)"/>
    <circle cx="16" cy="13" r="4" fill="url(#gold-light)"/>
    <circle cx="16" cy="13" r="2" fill="url(#gold-crown)" opacity="0.6"/>
    <circle cx="56" cy="21" r="4.5" fill="url(#gold-light)"/>
    <circle cx="56" cy="21" r="2.5" fill="url(#gold-crown)" opacity="0.6"/>
    
    <!-- Center jewel - larger, more prominent -->
    <circle cx="0" cy="41" r="5" fill="url(#gold-light)"/>
    <circle cx="0" cy="41" r="3" fill="#C9A84C" opacity="0.5"/>
    
    <!-- Crown rim highlight -->
    <path d="M-48,72 L48,72" stroke="url(#gold-light)" stroke-width="0.8" opacity="0.6"/>
    <path d="M-52,82 L52,82" stroke="#9E7E2A" stroke-width="0.5" opacity="0.5"/>
  </g>
  
  <!-- Decorative flourish above M -->
  <line x1="340" y1="124" x2="460" y2="124" stroke="url(#gold-main)" stroke-width="0.6" opacity="0.3"/>
  
  <!-- M Monogram - elegant serif with refined weight -->
  <g transform="translate(400, 130)" filter="url(#subtle-glow)">
    <!-- M built from paths for precise control -->
    <path d="M-58,130 L-58,0 L-52,0 L0,80 L52,0 L58,0 L58,130 L46,130 L46,28 L0,100 L-46,28 L-46,130 Z" 
          fill="url(#gold-main)" stroke="url(#gold-light)" stroke-width="0.3"/>
    <!-- Inner serifs -->
    <rect x="-64" y="126" width="24" height="5" rx="1" fill="url(#gold-main)"/>
    <rect x="40" y="126" width="24" height="5" rx="1" fill="url(#gold-main)"/>
    <rect x="-64" y="-2" width="18" height="4" rx="1" fill="url(#gold-main)"/>
    <rect x="46" y="-2" width="18" height="4" rx="1" fill="url(#gold-main)"/>
  </g>

  <!-- Decorative separator - double line with diamond -->
  <g transform="translate(400, 298)">
    <line x1="-180" y1="0" x2="-12" y2="0" stroke="url(#gold-main)" stroke-width="0.8"/>
    <line x1="12" y1="0" x2="180" y2="0" stroke="url(#gold-main)" stroke-width="0.8"/>
    <!-- Center diamond -->
    <path d="M0,-6 L6,0 L0,6 L-6,0 Z" fill="url(#gold-main)"/>
    <!-- Outer subtle lines -->
    <line x1="-160" y1="4" x2="-30" y2="4" stroke="url(#gold-main)" stroke-width="0.3" opacity="0.4"/>
    <line x1="30" y1="4" x2="160" y2="4" stroke="url(#gold-main)" stroke-width="0.3" opacity="0.4"/>
  </g>
  
  <!-- MONARCH X - primary text, wide tracked elegant serif -->
  <text x="400" y="345" 
        font-family="'Didot', 'Bodoni MT', 'Playfair Display', 'Cormorant Garamond', Georgia, serif" 
        font-size="38" 
        font-weight="400"
        text-anchor="middle" 
        fill="url(#gold-main)" 
        letter-spacing="14"
        font-variant="small-caps">Monarch X</text>
  
  <!-- CAPITAL - secondary, lighter weight, wider tracking -->
  <text x="400" y="385" 
        font-family="'Didot', 'Bodoni MT', 'Playfair Display', 'Cormorant Garamond', Georgia, serif" 
        font-size="20" 
        font-weight="300"
        text-anchor="middle" 
        fill="url(#gold-main)" 
        letter-spacing="18"
        opacity="0.85">CAPITAL</text>
  
  <!-- Subtle bottom flourish -->
  <line x1="340" y1="400" x2="460" y2="400" stroke="url(#gold-main)" stroke-width="0.4" opacity="0.25"/>
</svg>