<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 100" width="700" height="100">
  <!-- Abstract geometric X mark - clean intersecting lines forming a diamond/X -->
  <g transform="translate(30, 50)">
    <!-- Outer X with extended serifs - embroidery friendly -->
    <line x1="0" y1="-24" x2="20" y2="0" stroke="#1a1a2e" stroke-width="1.5" />
    <line x1="20" y1="0" x2="0" y2="24" stroke="#1a1a2e" stroke-width="1.5" />
    <line x1="40" y1="-24" x2="20" y2="0" stroke="#1a1a2e" stroke-width="1.5" />
    <line x1="20" y1="0" x2="40" y2="24" stroke="#1a1a2e" stroke-width="1.5" />
    <!-- Small horizontal accent lines at tips -->
    <line x1="-4" y1="-24" x2="4" y2="-24" stroke="#1a1a2e" stroke-width="1.5" />
    <line x1="36" y1="-24" x2="44" y2="-24" stroke="#1a1a2e" stroke-width="1.5" />
    <line x1="-4" y1="24" x2="4" y2="24" stroke="#1a1a2e" stroke-width="1.5" />
    <line x1="36" y1="24" x2="44" y2="24" stroke="#1a1a2e" stroke-width="1.5" />
  </g>
  <!-- Wordmark -->
  <text x="100" y="62" text-anchor="start" font-family="'Didot', 'Playfair Display', 'Georgia', 'Times New Roman', serif" font-size="38" font-weight="400" fill="#1a1a2e" letter-spacing="12">MONARCH X CAPITAL</text>
</svg>