<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#141425"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="gold-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D5A3"/>
      <stop offset="25%" style="stop-color:#D4B96A"/>
      <stop offset="50%" style="stop-color:#C9A84C"/>
      <stop offset="75%" style="stop-color:#B8963A"/>
      <stop offset="100%" style="stop-color:#A6842F"/>
    </linearGradient>
    <linearGradient id="gold-light" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0E2B6"/>
      <stop offset="100%" style="stop-color:#D4B96A"/>
    </linearGradient>
    <linearGradient id="gold-crown" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F2E6C2"/>
      <stop offset="30%" style="stop-color:#D9C172"/>
      <stop offset="60%" style="stop-color:#C4A64E"/>
      <stop offset="100%" style="stop-color:#9E7E2A"/>
    </linearGradient>
    <filter id="gold-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#C9A84C" flood-opacity="0.15" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feComposite in="SourceGraphic" in2="glow" operator="over"/>
    </filter>
    <filter id="text-glow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="480" fill="url(#bg-grad)"/>
  
  <!-- Subtle vignette corners -->
  <rect width="800" height="480" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.08" rx="0"/>
  <rect x="20" y="20" width="760" height="440" fill="none" stroke="#C9A84C" stroke-width="0.3" opacity="0.06"/>
  
  <!-- Crown -->
  <g transform="translate(400, 48)" filter="url(#gold-glow)">
    <path d="M-52,82 L52,82 L48,72 L-48,72 Z" fill="url(#gold-main)"/>
    <path d="M-48,72 L-56,24 L-32,48 L-16,16 L0,44 L16,16 L32,48 L56,24 L48,72 Z" 
          fill="url(#gold-crown)" stroke="url(#gold-light)" stroke-width="0.5"/>
    <path d="M-36,72 Q-28,52 -18,72" fill="none" stroke="url(#gold-light)" stroke-width="1" opacity="0.35"/>
    <path d="M-12,72 Q0,48 12,72" fill="none" stroke="url(#gold-light)" stroke-width="1" opacity="0.35"/>
    <path d="M18,72 Q28,52 36,72" fill="none" stroke="url(#gold-light)" stroke-width="1" opacity="0.35"/>
    <circle cx="-56" cy="21" r="4.5" fill="url(#gold-light)"/>
    <circle cx="-56" cy="21" r="2.5" fill="url(#gold-crown)" opacity="0.6"/>
    <circle cx="-16" cy="13" r="4" fill="url(#gold-light)"/>
    <circle cx="-16" cy="13" r="2" fill="url(#gold-crown)" opacity="0.6"/>
    <circle cx="16" cy="13" r="4" fill="url(#gold-light)"/>
    <circle cx="16" cy="13" r="2" fill="url(#gold-crown)" opacity="0.6"/>
    <circle cx="56" cy="21" r="4.5" fill="url(#gold-light)"/>
    <circle cx="56" cy="21" r="2.5" fill="url(#gold-crown)" opacity="0.6"/>
    <circle cx="0" cy="41" r="5.5" fill="url(#gold-light)"/>
    <circle cx="0" cy="41" r="3" fill="#C9A84C" opacity="0.5"/>
    <path d="M-48,72 L48,72" stroke="url(#gold-light)" stroke-width="0.8" opacity="0.5"/>
  </g>
  
  <!-- Thin accent line -->
  <line x1="340" y1="144" x2="460" y2="144" stroke="url(#gold-main)" stroke-width="0.5" opacity="0.25"/>
  
  <!-- M Monogram -->
  <g transform="translate(400, 150)" filter="url(#gold-glow)">
    <path d="M-58,130 L-58,0 L-52,0 L0,80 L52,0 L58,0 L58,130 L46,130 L46,28 L0,100 L-46,28 L-46,130 Z" 
          fill="url(#gold-main)" stroke="url(#gold-light)" stroke-width="0.3"/>
    <rect x="-64" y="126" width="24" height="5" rx="1" fill="url(#gold-main)"/>
    <rect x="40" y="126" width="24" height="5" rx="1" fill="url(#gold-main)"/>
    <rect x="-64" y="-2" width="18" height="4" rx="1" fill="url(#gold-main)"/>
    <rect x="46" y="-2" width="18" height="4" rx="1" fill="url(#gold-main)"/>
  </g>

  <!-- Separator with diamond -->
  <g transform="translate(400, 318)">
    <line x1="-180" y1="0" x2="-12" y2="0" stroke="url(#gold-main)" stroke-width="0.8"/>
    <line x1="12" y1="0" x2="180" y2="0" stroke="url(#gold-main)" stroke-width="0.8"/>
    <path d="M0,-6 L6,0 L0,6 L-6,0 Z" fill="url(#gold-main)"/>
    <line x1="-160" y1="4" x2="-30" y2="4" stroke="url(#gold-main)" stroke-width="0.3" opacity="0.35"/>
    <line x1="30" y1="4" x2="160" y2="4" stroke="url(#gold-main)" stroke-width="0.3" opacity="0.35"/>
  </g>
  
  <!-- MONARCH X -->
  <text x="400" y="365" 
        font-family="'Didot', 'Bodoni MT', 'Playfair Display', 'Cormorant Garamond', Georgia, serif" 
        font-size="38" 
        font-weight="400"
        text-anchor="middle" 
        fill="url(#gold-main)" 
        letter-spacing="14"
        font-variant="small-caps"
        filter="url(#text-glow)">Monarch X</text>
  
  <!-- CAPITAL -->
  <text x="400" y="405" 
        font-family="'Didot', 'Bodoni MT', 'Playfair Display', 'Cormorant Garamond', Georgia, serif" 
        font-size="20" 
        font-weight="300"
        text-anchor="middle" 
        fill="url(#gold-main)" 
        letter-spacing="18"
        opacity="0.8"
        filter="url(#text-glow)">CAPITAL</text>
  
  <!-- Bottom accent -->
  <line x1="340" y1="420" x2="460" y2="420" stroke="url(#gold-main)" stroke-width="0.4" opacity="0.2"/>
</svg>